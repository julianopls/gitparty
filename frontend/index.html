<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evently Login</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">

  <div class="left-side">
    <div class="logo">Evently</div>

    <div class="hero">
      <h1>Gestao de eventos sem fricçao.</h1>

      <p>
        A plataforma completa para gerenciar, promover e analisar o sucesso dos seus eventos com ferramentas de nível profissional.
      </p>
    </div>
  </div>

  <div class="right-side">

    <h2>Bem-vindo de volta</h2>

    <p>Insira seus dados para acessar o painel.</p>

    <div class="tabs">
      <button class="active">Entrar</button>
      <button>Criar Conta</button>
    </div>

    <form id="loginForm">

      <label>E-mail corporativo</label>

      <input type="email" id="email" placeholder="nome@empresa.com">

      <label>Senha</label>

      <div class="password-box">
        <input type="password" id="senha" placeholder="********">
        <button type="button" id="toggleSenha">👁</button>
      </div>

      <button type="submit" class="login-btn">
        Entrar na Plataforma
      </button>

    </form>

    <div class="separator">
      <span>ou continue com</span>
    </div>

    <div class="socials">
      <button>Google</button>
      <button>Apple</button>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
